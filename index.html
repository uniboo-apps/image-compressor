<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像圧縮ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px 28px;
      width: 100%;
      max-width: 560px;
      margin-top: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .drop-zone {
      border: 2px dashed #c8d0df;
      border-radius: 12px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      background: #fafbfc;
      transition: border-color 0.18s, background 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #4f8ef7;
      background: #f0f5ff;
    }

    .drop-zone svg { color: #c0c8d8; margin-bottom: 12px; }

    .drop-zone p { font-size: 14px; color: #555; line-height: 1.7; }
    .drop-zone .link { color: #4f8ef7; font-weight: 600; }
    .drop-hint { font-size: 11px; color: #bbb; margin-top: 8px; }

    #fileInput { display: none; }

    /* Preview */
    .preview-section { margin-top: 24px; display: none; }
    .preview-section.visible { display: block; }

    .preview-img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 10px;
      background: #f0f2f5;
      display: block;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8f9fb;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .info-label {
      font-size: 10px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .info-value.ok   { color: #22c55e; }
    .info-value.warn { color: #f97316; }

    /* Progress */
    .progress-wrap { margin-top: 14px; display: none; }
    .progress-wrap.visible { display: block; }

    .progress-track {
      height: 4px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f8ef7, #a78bfa);
      border-radius: 999px;
      width: 0%;
      transition: width 0.22s ease;
    }

    .status {
      font-size: 13px;
      color: #777;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
      line-height: 1.5;
    }
    .status.error   { color: #ef4444; }
    .status.success { color: #22c55e; }

    /* Buttons */
    .btn {
      display: none;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn.visible { display: block; }

    .btn-primary {
      background: linear-gradient(135deg, #4f8ef7, #7c5bf7);
      color: #fff;
    }
    .btn-primary:active { opacity: 0.82; }

    .btn-secondary {
      background: #f5f7fa;
      color: #777;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      padding: 12px;
    }
    .btn-secondary:active { background: #eef0f5; }

    /* note */
    .note {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      margin-top: 18px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>画像圧縮ツール</h1>
  <p class="subtitle">4.8 MB 超を自動圧縮 ／ JPEG・PNG・WebP・HEIC（iPhone）対応</p>

  <div class="drop-zone" id="dropZone">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021
               18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <p>ここにドロップ、または<br><span class="link">タップしてファイルを選択</span></p>
    <p class="drop-hint">JPEG / PNG / WebP / HEIC（iPhone）</p>
  </div>

  <input type="file" id="fileInput"
         accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,.heif">

  <div class="preview-section" id="previewSection">
    <img class="preview-img" id="previewImg" src="" alt="プレビュー">

    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">元のサイズ</div>
        <div class="info-value warn" id="origSize">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">圧縮後のサイズ</div>
        <div class="info-value ok" id="compSize">—</div>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <button class="btn btn-primary" id="btnDownload">圧縮画像をダウンロード</button>
    <button class="btn btn-secondary" id="btnReset">別の画像を選択</button>
  </div>

  <p class="note">画像はブラウザ内で処理されます。外部サーバーには送信されません。</p>
</div>

<canvas id="canvas" style="display:none"></canvas>

<!-- HEIC 変換ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
const MAX_BYTES = 4.8 * 1024 * 1024;

const $  = id => document.getElementById(id);
const dropZone    = $('dropZone');
const fileInput   = $('fileInput');
const previewSec  = $('previewSection');
const previewImg  = $('previewImg');
const origSizeEl  = $('origSize');
const compSizeEl  = $('compSize');
const statusEl    = $('status');
const progressWrap = $('progressWrap');
const progressFill = $('progressFill');
const btnDownload = $('btnDownload');
const btnReset    = $('btnReset');
const canvas      = $('canvas');
const ctx         = canvas.getContext('2d');

let resultBlob = null;
let resultName = 'compressed.jpg';

// ── ユーティリティ ──────────────────────────────────────────
function fmt(bytes) {
  return bytes >= 1048576
    ? (bytes / 1048576).toFixed(2) + ' MB'
    : (bytes / 1024).toFixed(1) + ' KB';
}
function setProgress(pct) {
  progressFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
}
function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}
function revokeAfter(url, ms = 30000) {
  setTimeout(() => URL.revokeObjectURL(url), ms);
}

function reset() {
  fileInput.value = '';
  resultBlob = null;
  previewSec.classList.remove('visible');
  ['btnDownload','btnReset'].forEach(id => $(id).classList.remove('visible'));
  progressWrap.classList.remove('visible');
  setProgress(0);
  setStatus('');
  origSizeEl.textContent = compSizeEl.textContent = '—';
}

// ── イベント ────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault(); dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});
btnReset.addEventListener('click', reset);
btnDownload.addEventListener('click', () => {
  if (!resultBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = resultName;
  a.click();
  revokeAfter(a.href, 60000);
});

// ── 画像処理 ────────────────────────────────────────────────
function isHeic(file) {
  return /\.(heic|heif)$/i.test(file.name) ||
    file.type === 'image/heic' || file.type === 'image/heif';
}

function loadImage(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    // img.onload 後に描画するので URL は即座に revoke して OK
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('画像の読み込みに失敗しました')); };
    img.src = url;
  });
}

function toBlob(type, quality) {
  return new Promise((resolve, reject) =>
    canvas.toBlob(b => b ? resolve(b) : reject(new Error('Blob 生成失敗')), type, quality)
  );
}

function drawToCanvas(img, w, h) {
  canvas.width  = w ?? img.naturalWidth;
  canvas.height = h ?? img.naturalHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
}

/**
 * 画質を最大限保ちながら 4.8 MB 以下に収める。
 * 戦略:
 *   1) 元解像度のまま JPEG 品質を二分探索（0.55〜0.95）
 *   2) それでも大きい場合のみ解像度を 5% ずつ縮小して再試行
 *
 * ポイント: canvas には最初の 1 回だけ drawImage し、
 * toBlob() を繰り返しても元ピクセルデータから毎回エンコードするため
 * 品質劣化は最終出力の 1 回のエンコードのみ。
 */
async function compressToTarget(img) {
  // Step 1: 解像度維持・品質二分探索
  drawToCanvas(img);
  let lo = 0.55, hi = 0.95, best = null;

  for (let i = 0; i < 18; i++) {
    const mid = (lo + hi) / 2;
    setProgress(30 + (i / 18) * 45);
    const blob = await toBlob('image/jpeg', mid);
    if (blob.size <= MAX_BYTES) { best = { blob, q: mid }; lo = mid; }
    else { hi = mid; }
    if (hi - lo < 0.003) break;
  }
  if (best) return best.blob;

  // Step 2: 品質 0.55 でも超過 → 解像度を縮小（画質は 0.82 固定で再試行）
  for (let scale = 0.90; scale >= 0.20; scale -= 0.05) {
    const pct = (0.90 - scale) / 0.70;
    setProgress(78 + pct * 18);
    const w = Math.round(img.naturalWidth  * scale);
    const h = Math.round(img.naturalHeight * scale);
    drawToCanvas(img, w, h);
    const blob = await toBlob('image/jpeg', 0.82);
    if (blob.size <= MAX_BYTES) return blob;
  }

  throw new Error('圧縮できませんでした。元のファイルが極端に大きい可能性があります。');
}

// ── メイン処理 ──────────────────────────────────────────────
async function handleFile(file) {
  if (!/^image\//i.test(file.type) && !isHeic(file)) {
    alert('画像ファイルを選択してください。');
    return;
  }

  // UI 初期化
  previewSec.classList.add('visible');
  btnDownload.classList.remove('visible');
  btnReset.classList.add('visible');
  progressWrap.classList.add('visible');
  setProgress(8);
  setStatus('読み込み中...');
  origSizeEl.textContent = fmt(file.size);
  compSizeEl.textContent = '—';

  const baseName = file.name.replace(/\.(heic|heif|jpe?g|png|webp)$/i, '');
  resultName = (baseName || 'image') + '_compressed.jpg';

  // ① HEIC → JPEG 変換（必要な場合）
  let imageBlob = file;
  if (isHeic(file)) {
    setStatus('HEIC を変換中...');
    setProgress(18);
    try {
      // quality: 0.95 で高品質な中間 JPEG を生成。
      // その後キャンバスで最終 JPEG に再エンコードするため
      // 実質的な劣化は最終エンコード 1 回分のみ。
      const out = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.95 });
      imageBlob = Array.isArray(out) ? out[0] : out;
    } catch (e) {
      setStatus(
        'HEIC の変換に失敗しました。\niPhone の「設定 → カメラ → フォーマット → 互換性優先」に変更すると JPEG で保存されます。',
        'error'
      );
      btnReset.classList.add('visible');
      return;
    }
  }

  setProgress(26);

  // ② 画像を img 要素に読み込む
  let img;
  try {
    img = await loadImage(imageBlob);
  } catch (e) {
    setStatus(e.message, 'error'); return;
  }

  // ③ プレビュー表示（圧縮後に更新する）
  const prevUrl = URL.createObjectURL(imageBlob);
  previewImg.src = prevUrl;
  revokeAfter(prevUrl, 60000);

  // ④ サイズ判定
  const needsCompress = isHeic(file) ? imageBlob.size > MAX_BYTES : file.size > MAX_BYTES;

  if (!needsCompress) {
    // 圧縮不要
    setProgress(100);
    const outBlob = isHeic(file) ? imageBlob : file;
    compSizeEl.textContent = fmt(outBlob.size);
    resultBlob = outBlob;
    resultName = isHeic(file) ? resultName : file.name;
    setStatus(
      isHeic(file) ? '✓ HEIC → JPEG 変換完了。圧縮は不要でした。' : '✓ 4.8 MB 以下のため圧縮不要です。',
      'success'
    );
    btnDownload.classList.add('visible');
    return;
  }

  // ⑤ 圧縮実行
  setStatus('圧縮中...');
  try {
    const compressed = await compressToTarget(img);
    compSizeEl.textContent = fmt(compressed.size);
    setProgress(100);
    setStatus(`✓ 完了！ ${fmt(file.size)} → ${fmt(compressed.size)}`, 'success');

    // プレビューを圧縮結果で更新
    const compUrl = URL.createObjectURL(compressed);
    previewImg.src = compUrl;
    revokeAfter(compUrl, 120000);

    resultBlob = compressed;
    btnDownload.classList.add('visible');
  } catch (e) {
    setStatus(e.message, 'error');
  }
}
</script>
</body>
</html>
